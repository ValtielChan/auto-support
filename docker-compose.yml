services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-autosupport}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-autosupport}
      POSTGRES_DB: ${POSTGRES_DB:-autosupport}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-autosupport}"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      # Point DATABASE_URL at your own PostgreSQL server to skip the bundled one.
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://${POSTGRES_USER:-autosupport}:${POSTGRES_PASSWORD:-autosupport}@db:5432/${POSTGRES_DB:-autosupport}}
      SECRET_KEY: ${SECRET_KEY:?Set SECRET_KEY in .env (e.g. openssl rand -hex 32)}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?Set ADMIN_PASSWORD in .env}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      DEFAULT_MODEL: ${DEFAULT_MODEL:-gpt-5.6-terra}
    ports:
      - "${APP_PORT:-8000}:8000"

volumes:
  pgdata:
